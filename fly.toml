# Fly.io — get a URL like https://<your-app>.fly.dev
#   fly launch --dockerfile Dockerfile   # first time; pick a unique app name
#   fly secrets set OPENAI_API_KEY=xxx GOOGLE_API_KEY=yyy
#   fly deploy
#
# Fly sets PORT to match internal_port below.

app = "ai-interview-coach"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 5050
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]
