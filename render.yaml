# Render Blueprint: https://render.com/docs/blueprint-spec
# After you connect this repo in Render → New → Blueprint, you get a URL like:
#   https://<service-name>.onrender.com
#
# In the Render dashboard add Environment variables (required for full functionality):
#   OPENAI_API_KEY, GOOGLE_API_KEY (and/or GROQ_API_KEY, HUGGINGFACE_API_KEY)
# Optional: GROQ_WHISPER_MODEL, GEMINI_MODEL, SECRET_KEY, CORS_ORIGINS
#
# Note: Render free tier may enforce ~100s HTTP request limits; long Whisper+LLM
# calls can fail on free plans. Use Fly.io, a VPS, or ngrok to local Docker for heavy use.

services:
  - type: web
    name: ai-interview-coach
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/health
