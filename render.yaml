# Render Blueprint: https://render.com/docs/blueprint-spec
# After you connect this repo in Render → New → Blueprint, you get a URL like:
#   https://<service-name>.onrender.com
#
# Link your Environment Group by **name** (dashboard name), not the URL id (evg-…).
# If your group is not named INTERVIEW, change `fromGroup` below to match exactly.
# Still add OPENAI_API_KEY on the group or service for Whisper.
# Docs: https://render.com/docs/blueprint-spec#setting-environment-variables
#
# Note: Render free tier may enforce ~100s HTTP request limits; long Whisper+LLM
# calls can fail on free plans. Use Fly.io, a VPS, or ngrok to local Docker for heavy use.

services:
  - type: web
    name: ai-interview-coach
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/health
    # Injects every variable from the Environment Group named "INTERVIEW"
    envVars:
      - fromGroup: INTERVIEW
