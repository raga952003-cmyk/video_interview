# Render Blueprint: https://render.com/docs/blueprint-spec
# New → Blueprint → connect repo → deploy. URL: https://<service-name>.onrender.com
#
# After the first deploy, open the service → Environment and set at least:
#   - Speech-to-text: OPENAI_API_KEY and/or GROQ_API_KEY (or LOCAL_WHISPER=1 for CPU Whisper)
#   - Grading: GOOGLE_API_KEY and/or GROQ_API_KEY and/or HUGGINGFACE_API_KEY
# Optional: GEMINI_MODEL, ADMIN_API_KEY (admin APIs), CORS_ORIGINS if UI is on another domain.
# SQLite + recordings live in the container filesystem unless you attach a disk or use DATABASE_URL (Postgres).
#
# To use a Render Environment Group instead, replace `envVars` below with:
#   envVars: [ { fromGroup: YOUR_GROUP_NAME } ]
#
# Note: Render free tier may enforce ~100s HTTP request limits; long Whisper+LLM
# calls can fail on free plans. Use Fly.io, a VPS, or ngrok to local Docker for heavy use.

services:
  - type: web
    name: ai-interview-coach
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: GEMINI_MODEL
        sync: false
      - key: ADMIN_API_KEY
        sync: false
      - key: LOCAL_WHISPER
        sync: false
      - key: DATABASE_URL
        sync: false
