# Render Blueprint: https://render.com/docs/blueprint-spec
# New → Blueprint → connect repo → deploy. URL: https://<service-name>.onrender.com
#
# After the first deploy, open the service → Environment and set:
#   OPENAI_API_KEY, GOOGLE_API_KEY (and/or GROQ_API_KEY, HUGGINGFACE_API_KEY).
# Optional: CORS_ORIGINS = your public URL (same-origin Docker UI usually needs no change).
#
# To use a Render Environment Group instead, replace `envVars` below with:
#   envVars: [ { fromGroup: YOUR_GROUP_NAME } ]
#
# Note: Render free tier may enforce ~100s HTTP request limits; long Whisper+LLM
# calls can fail on free plans. Use Fly.io, a VPS, or ngrok to local Docker for heavy use.

services:
  - type: web
    name: ai-interview-coach
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
